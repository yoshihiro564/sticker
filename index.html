<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LINEスタンプ量産ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Kaisei+Decol:wght@400;700&family=Zen+Maru+Gothic:wght@400;700;900&family=Dela+Gothic+One&family=Stick&family=Yuji+Syuku&family=Hachi+Maru+Pop&family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDPMincho&family=Shippori+Mincho:wght@400;700;800&family=Zen+Antique&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8003a;
    --bg: #fafaf8;
    --panel: #ffffff;
    --border: #e8e0d8;
    --text: #1a1a1a;
    --muted: #888;
    --accent: #e8003a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--red);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(232,0,58,0.3);
  }
  header h1 {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  header span {
    font-size: 20px;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--panel);
    border-radius: 14px;
    padding: 18px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    height: 160px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    background: #fdfcfb;
    color: var(--text);
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--red); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .count-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
  }

  /* デザイン設定 */
  .design-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  label.field-label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: block;
    margin-bottom: 5px;
  }

  select, input[type="color"], input[type="range"], input[type="number"] {
    width: 100%;
    height: 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 10px;
    font-size: 13px;
    font-family: inherit;
    background: #fdfcfb;
    outline: none;
    appearance: auto;
  }
  select:focus, input:focus { border-color: var(--red); }

  input[type="color"] {
    padding: 3px 6px;
    cursor: pointer;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type="range"] {
    height: 4px;
    padding: 0;
    flex: 1;
    accent-color: var(--red);
  }
  .range-val {
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
    min-width: 32px;
    text-align: right;
  }

  /* プレビュー */
  .preview-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .preview-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
  }
  .preview-scroll::-webkit-scrollbar { height: 4px; }
  .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .stamp-wrapper {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  canvas.stamp-canvas {
    border-radius: 8px;
    background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 0 0 / 12px 12px;
    display: block;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  canvas.stamp-canvas:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .dl-single {
    font-size: 10px;
    color: var(--red);
    font-weight: 700;
    cursor: pointer;
    padding: 3px 10px;
    border: 1.5px solid var(--red);
    border-radius: 20px;
    background: white;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .dl-single:hover { background: var(--red); color: white; }

  /* アクションボタン */
  .action-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    height: 50px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--red);
    color: white;
    box-shadow: 0 4px 14px rgba(232,0,58,0.3);
  }
  .btn-primary:hover { background: #c4002e; transform: translateY(-1px); }
  .btn-secondary {
    background: #1a1a1a;
    color: white;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }
  .btn-secondary:hover { background: #333; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-generate {
    width: 100%;
    height: 54px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 18px rgba(232,0,58,0.35);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-generate:hover { background: #c4002e; transform: translateY(-1px); }

  .empty-state {
    text-align: center;
    padding: 30px 0;
    color: var(--muted);
    font-size: 13px;
  }

  /* フォントサンプル */
  .font-preview-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .font-chip {
    font-size: 13px;
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }
  .font-chip.active {
    border-color: var(--red);
    background: #fff0f3;
    color: var(--red);
    font-weight: 700;
  }

  .sep { height: 1px; background: var(--border); margin: 12px 0; }

  .bg-toggle {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .bg-chip {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bg-chip.active {
    border-color: var(--red);
    background: #fff0f3;
    color: var(--red);
  }
</style>
</head>
<body>

<header>
  <span>🎌</span>
  <h1>LINEスタンプ量産ツール</h1>
</header>

<div class="container">

  <!-- 文言入力 -->
  <div class="card">
    <div class="card-title">
      文言入力
      <span class="count-badge" id="lineCount">0行</span>
    </div>
    <textarea id="textInput" placeholder="1行につき1スタンプになります。&#10;例：&#10;前向きな回答を示してほしい&#10;山積する課題に取り組む&#10;誠意ある回答を示してもらいたい&#10;…最大40行"></textarea>
    <div class="hint">📝 1行＝1スタンプ　最大40行まで対応</div>
  </div>

  <!-- デザイン設定 -->
  <div class="card">
    <div class="card-title">デザイン設定</div>

    <label class="field-label">フォント</label>
    <div class="font-preview-row" id="fontChips">
      <div class="font-chip active" data-font="'Noto Serif JP',serif" data-weight="700" style="font-family:'Noto Serif JP',serif;font-weight:700">Noto明朝</div>
      <div class="font-chip" data-font="'Shippori Mincho',serif" data-weight="700" style="font-family:'Shippori Mincho',serif;font-weight:700">しっぽり明朝</div>
      <div class="font-chip" data-font="'BIZ UDPMincho',serif" data-weight="400" style="font-family:'BIZ UDPMincho',serif">BIZ明朝</div>
      <div class="font-chip" data-font="'Zen Antique',serif" data-weight="400" style="font-family:'Zen Antique',serif">禅アンティーク</div>
      <div class="font-chip" data-font="'Noto Sans JP',sans-serif" data-weight="700" style="font-family:'Noto Sans JP',sans-serif;font-weight:700">Notoゴシック</div>
      <div class="font-chip" data-font="'Noto Sans JP',sans-serif" data-weight="900" style="font-family:'Noto Sans JP',sans-serif;font-weight:900">極太ゴシック</div>
      <div class="font-chip" data-font="'BIZ UDPGothic',sans-serif" data-weight="700" style="font-family:'BIZ UDPGothic',sans-serif;font-weight:700">BIZゴシック</div>
      <div class="font-chip" data-font="'Dela Gothic One',sans-serif" data-weight="400" style="font-family:'Dela Gothic One',sans-serif">デラゴシック</div>
      <div class="font-chip" data-font="'Zen Maru Gothic',sans-serif" data-weight="700" style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700">丸ゴシック</div>
      <div class="font-chip" data-font="'Klee One',cursive" data-weight="600" style="font-family:'Klee One',cursive;font-weight:600">クレー（手書き）</div>
      <div class="font-chip" data-font="'Yuji Syuku',serif" data-weight="400" style="font-family:'Yuji Syuku',serif">毛筆</div>
      <div class="font-chip" data-font="'Hachi Maru Pop',cursive" data-weight="400" style="font-family:'Hachi Maru Pop',cursive">はちまるポップ</div>
      <div class="font-chip" data-font="'Stick',sans-serif" data-weight="400" style="font-family:'Stick',sans-serif">スティック</div>
    </div>

    <div class="sep"></div>

    <div class="design-grid">
      <div>
        <label class="field-label">文字色</label>
        <input type="color" id="textColor" value="#e8003a">
      </div>
      <div>
        <label class="field-label">背景</label>
        <div class="bg-toggle">
          <div class="bg-chip active" data-bg="transparent" id="bgTransparent">透明</div>
          <div class="bg-chip" data-bg="white" id="bgWhite">白</div>
        </div>
      </div>
    </div>

    <div class="sep"></div>

    <label class="field-label">最大フォントサイズ</label>
    <div class="range-row">
      <input type="range" id="fontSize" min="20" max="80" value="48">
      <span class="range-val" id="fontSizeVal">48px</span>
    </div>

    <div class="sep"></div>

    <label class="field-label">余白（上下左右）</label>
    <div class="range-row">
      <input type="range" id="padding" min="10" max="60" value="28">
      <span class="range-val" id="paddingVal">28px</span>
    </div>

    <div class="sep"></div>

    <label class="field-label">行間</label>
    <div class="range-row">
      <input type="range" id="lineHeight" min="100" max="200" value="145">
      <span class="range-val" id="lineHeightVal">1.45</span>
    </div>
  </div>

  <!-- 生成ボタン -->
  <button class="btn-generate" id="generateBtn">
    ✦ スタンプを生成する
  </button>

  <!-- プレビュー -->
  <div class="card" id="previewCard" style="display:none">
    <div class="preview-label">
      プレビュー
      <span id="stampCountLabel" style="color:var(--red);font-weight:800"></span>
    </div>
    <div class="preview-scroll" id="previewArea"></div>

    <div style="margin-top:16px">
      <div class="action-row">
        <button class="btn btn-primary" id="zipBtn">📦 ZIPで一括DL</button>
        <button class="btn btn-secondary" id="allSingleBtn">⬇ 全て個別DL</button>
      </div>
    </div>
  </div>

</div>

<script>
// ---- 設定 ----
const W = 370, H = 320;
let stamps = []; // {text, canvas}
let selectedFont = "'Noto Serif JP',serif";
let selectedFontWeight = "700";
let bgMode = "transparent";

// ---- 行数カウント ----
const textInput = document.getElementById('textInput');
const lineCountEl = document.getElementById('lineCount');
textInput.addEventListener('input', () => {
  const lines = getLines();
  lineCountEl.textContent = lines.length + '行';
});

function getLines() {
  return textInput.value.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .slice(0, 40);
}

// ---- フォント選択 ----
document.querySelectorAll('.font-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.font-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedFont = chip.dataset.font;
    selectedFontWeight = chip.dataset.weight || 'bold';
  });
});

// ---- 背景選択 ----
document.querySelectorAll('.bg-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.bg-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    bgMode = chip.dataset.bg;
  });
});

// ---- range表示 ----
const fsEl = document.getElementById('fontSize');
const fsVal = document.getElementById('fontSizeVal');
fsEl.addEventListener('input', () => fsVal.textContent = fsEl.value + 'px');

const padEl = document.getElementById('padding');
const padVal = document.getElementById('paddingVal');
padEl.addEventListener('input', () => padVal.textContent = padEl.value + 'px');

const lhEl = document.getElementById('lineHeight');
const lhVal = document.getElementById('lineHeightVal');
lhEl.addEventListener('input', () => lhVal.textContent = (lhEl.value/100).toFixed(2));

// ---- スタンプ描画 ----
function drawStamp(text, scale) {
  scale = scale || 1;
  const canvas = document.createElement('canvas');
  canvas.width = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext('2d');

  // 背景
  if (bgMode === 'white') {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, W * scale, H * scale);
  }
  // transparent: 何も描かない

  const color = document.getElementById('textColor').value;
  const baseFontSize = parseInt(fsEl.value);
  const pad = parseInt(padEl.value) * scale;
  const lhRatio = lhEl.value / 100;

  const maxW = (W * scale) - pad * 2;
  const maxH = (H * scale) - pad * 2;

  // 自動最適化: フォントサイズを縮小しながら収める
  let fontSize = baseFontSize * scale;
  let lines;

  for (let trySize = fontSize; trySize >= 10 * scale; trySize -= scale) {
    const fontStr = `${selectedFontWeight} ${trySize}px ` + selectedFont;
    ctx.font = fontStr;

    // 自動改行
    lines = autoWrap(ctx, text, maxW);

    const totalH = lines.length * trySize * lhRatio;
    if (totalH <= maxH) {
      fontSize = trySize;
      break;
    }
  }

  // 最終描画
  const fontStr = `${selectedFontWeight} ${fontSize}px ` + selectedFont;
  ctx.font = fontStr;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const lineH = fontSize * lhRatio;
  const totalH = lines.length * lineH;
  const startY = (H * scale) / 2 - totalH / 2 + lineH / 2;

  lines.forEach((line, i) => {
    ctx.fillText(line, (W * scale) / 2, startY + i * lineH);
  });

  return canvas;
}

function autoWrap(ctx, text, maxW) {
  // 行頭禁則文字（行頭に来てはいけない）
  const noStart = new Set('、。，．・：；？！）」』】〕〉》｝ぁぃぅぇぉっゃゅょゎァィゥェォッャュョヮヵヶ');
  // 行末禁則文字（行末に来てはいけない）
  const noEnd = new Set('（「『【〔〈《｛');

  // ---- STEP1: 文節候補の区切り点を求める ----
  // 助詞・助動詞の直後、および読点の直後を「優先改行点」とする
  const breakAfter = /[のをはがでにとももてへからためこそまでよりだけしかさえでもまで、。]/;

  // 候補インデックスを列挙（その文字の直後で切れる）
  const breakPoints = [];
  for (let i = 0; i < text.length - 1; i++) {
    if (breakAfter.test(text[i])) breakPoints.push(i);
  }

  // ---- STEP2: 何行になるか試算して最適行数を決定 ----
  function measureLine(s) { return ctx.measureText(s).width; }

  // まず最大幅で収まる最小行数を計算（貪欲法）
  function greedySplit(str) {
    const result = [];
    let start = 0;
    while (start < str.length) {
      let end = start + 1;
      while (end < str.length && measureLine(str.slice(start, end + 1)) <= maxW) end++;
      result.push(str.slice(start, end));
      start = end;
    }
    return result;
  }

  const minLines = greedySplit(text).length;
  if (minLines === 1) return [text]; // 1行に収まるならそのまま

  // ---- STEP3: 行数を固定して均等分割を試みる ----
  function splitIntoN(str, n) {
    // n行に均等になるよう、文節区切り点を優先しながら分割
    const len = str.length;
    const idealLen = len / n; // 理想的な1行あたりの文字数

    const result = [];
    let start = 0;

    for (let line = 0; line < n - 1; line++) {
      const targetEnd = Math.round(idealLen * (line + 1)); // 理想的な分割位置

      // 文節区切り点の中から targetEnd に最も近いものを選ぶ
      let bestBreak = -1;
      let bestDist = Infinity;

      for (const bp of breakPoints) {
        if (bp <= start) continue;           // 既に処理済み
        if (bp >= len - 1) continue;         // 末尾は不要
        const candidate = bp + 1;            // 区切り点の直後
        const dist = Math.abs(candidate - targetEnd);
        // その行が maxW 内に収まるか確認
        if (measureLine(str.slice(start, candidate)) <= maxW && dist < bestDist) {
          bestDist = dist;
          bestBreak = candidate;
        }
      }

      if (bestBreak === -1) {
        // 文節点が使えない場合は幅で切る（禁則考慮）
        let end = start + 1;
        while (end < len && measureLine(str.slice(start, end + 1)) <= maxW) end++;
        // 行末禁則チェック
        while (end > start + 1 && noEnd.has(str[end - 1])) end--;
        // 行頭禁則チェック
        while (end < len && noStart.has(str[end])) end++;
        bestBreak = Math.min(end, len);
      }

      result.push(str.slice(start, bestBreak));
      start = bestBreak;
    }
    result.push(str.slice(start)); // 最終行
    return result;
  }

  // ---- STEP4: 最終行が短すぎないか確認 ----
  function isBalanced(lines) {
    if (lines.length < 2) return true;
    const maxLen = Math.max(...lines.map(l => measureLine(l)));
    const minLen = Math.min(...lines.map(l => measureLine(l)));
    // 最終行が最長行の30%未満なら不均等と判定
    return minLen >= maxLen * 0.3;
  }

  let result = splitIntoN(text, minLines);

  // 不均等なら行数を1増やして再試行
  if (!isBalanced(result) && minLines + 1 <= text.length) {
    const result2 = splitIntoN(text, minLines + 1);
    // 増やした方が均等かつ全行がmaxW内に収まるなら採用
    if (isBalanced(result2) && result2.every(l => measureLine(l) <= maxW)) {
      result = result2;
    }
  }

  // ---- STEP5: 禁則最終チェック ----
  // 行頭禁則：行頭に禁則文字があれば前行末に移動
  for (let i = 1; i < result.length; i++) {
    while (result[i].length > 0 && noStart.has(result[i][0]) && result[i - 1].length > 0) {
      result[i - 1] = result[i - 1] + result[i][0];
      result[i] = result[i].slice(1);
    }
  }
  // 空行除去
  return result.filter(l => l.length > 0);
}

// ---- 生成 ----
document.getElementById('generateBtn').addEventListener('click', () => {
  const lines = getLines();
  if (lines.length === 0) {
    alert('文言を入力してください');
    return;
  }

  stamps = [];
  const previewArea = document.getElementById('previewArea');
  previewArea.innerHTML = '';

  lines.forEach((text, idx) => {
    const canvas = drawStamp(text, 1);
    stamps.push({ text, canvas });

    // プレビュー表示（縮小）
    const previewCanvas = drawStamp(text, 0.5);
    previewCanvas.className = 'stamp-canvas';
    previewCanvas.title = text;

    const dlBtn = document.createElement('div');
    dlBtn.className = 'dl-single';
    dlBtn.textContent = '⬇ DL';
    dlBtn.addEventListener('click', () => downloadSingle(canvas, idx + 1, text));

    // クリックでDL
    previewCanvas.addEventListener('click', () => downloadSingle(canvas, idx + 1, text));

    const wrapper = document.createElement('div');
    wrapper.className = 'stamp-wrapper';
    wrapper.appendChild(previewCanvas);
    wrapper.appendChild(dlBtn);
    previewArea.appendChild(wrapper);
  });

  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('stampCountLabel').textContent = stamps.length + '枚生成完了';
  document.getElementById('previewCard').scrollIntoView({ behavior: 'smooth' });
});

// ---- 個別DL ----
function downloadSingle(canvas, num, text) {
  const a = document.createElement('a');
  const safe = text.replace(/[\/\\:*?"<>|]/g, '_').slice(0, 20);
  a.download = `stamp_${String(num).padStart(2,'0')}_${safe}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ---- 全て個別DL ----
document.getElementById('allSingleBtn').addEventListener('click', () => {
  stamps.forEach((s, i) => {
    setTimeout(() => downloadSingle(s.canvas, i + 1, s.text), i * 300);
  });
});

// ---- ZIP一括DL ----
document.getElementById('zipBtn').addEventListener('click', async () => {
  if (stamps.length === 0) return;
  const zip = new JSZip();
  const folder = zip.folder('line_stamps');

  stamps.forEach((s, i) => {
    const dataURL = s.canvas.toDataURL('image/png');
    const base64 = dataURL.split(',')[1];
    const safe = s.text.replace(/[\/\\:*?"<>|]/g, '_').slice(0, 20);
    folder.file(`stamp_${String(i+1).padStart(2,'0')}_${safe}.png`, base64, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'line_stamps.zip';
  a.click();
});
</script>
</body>
</html>
